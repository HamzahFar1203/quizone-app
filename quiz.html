<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Quizone</title>

        <link rel="stylesheet" href="css/quiz.css">
        <link rel="stylesheet" href="css/modular.css">
    </head>
    <body>

        <div id="wrapper">

            <h1 class="font-hammersmith-one font-white">Q</h1>

            <table class="font-white font-hammersmith-one">

                <thead>

                    <tr>
                        <th id="question">This is where the questions will be shown. With a line break occuring at 40 characters.</th>
                    </tr>

                </thead>
                <tbody>

                    <tr>
                        <td id="option-one">Option one. Line breaks will occur at 30 characters.</td>
                    </tr>
                    <tr>
                        <td id="option-two">Option two. Line breaks will occur at 30 characters.</td>
                    </tr>
                    <tr>
                        <td id="option-three">Option three. Line breaks will occur at 30 characters.</td>
                    </tr>
                    
                </tbody>
                <tfoot>

                    <tr>
                        <td>5/10</td>
                    </tr>

                </tfoot>

            </table>

        </div>

        <script src="js/quiz.js"></script>
    </body>
</html>
