<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="A quiz taking web app for studying concepts and terms">
        <title>Quizone</title>

        <link rel="stylesheet" href="css/index.css">
        <link rel="stylesheet" href="css/modular.css">
    </head>
    <body>
        
        <header class="top-bar">
            <p class="font-hammersmith-one font-white">None</p>
            <div id="start-button" class="font-gurajada">Start Quiz</div>
        </header>

        <main id="wrapper">

            <h1 class="font-hammersmith-one font-white">Quizone</h1>
            <p id="user-advice" class="font-white">Enter some questions and answers</p>

            <form>

                <label class="font-gurajada">question</label>
                <div>
                    <input type="text" name="question" maxlength="150">
                    <input type="button" name="add-question" value="+">
                </div>

                <label for="option-one-radio" class="font-gurajada">option one</label>
                <div>
                    <input type="text" name="option-one" maxlength="60">
                    <input type="radio" id="option-one-radio" name="selected-answer">
                </div>

                <label for="option-two-radio" class="font-gurajada">option two</label>
                <div>
                    <input type="text" name="option-two" maxlength="60">
                    <input type="radio" id="option-two-radio" name="selected-answer">
                </div>

                <label for="option-three-radio" class="font-gurajada">option three</label>
                <div>
                    <input type="text" name="option-three" maxlength="60">
                    <input type="radio" id="option-three-radio" name="selected-answer">
                </div>

            </form>

        </main>

        <script src="js/index.js"></script>
    </body>
</html>
